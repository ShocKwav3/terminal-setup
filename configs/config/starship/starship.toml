# ============================================================
#  starship.toml ÔÇö cyberdream ┬Ě macOS / zsh ┬Ě CUSTOMIZED
#  Shell commands below assume POSIX sh (test/ls/awk/python3).
# ============================================================

# --- TOP LEVEL LAYOUT ---
# Removed the memory/battery/time row entirely.
# --- SYMBOLS (Nerd Font, cannot be stored in palette) ---
# Left cap : U+E0C7
# Right cap: U+E0C6

format = """
[ÔĽşÔöÇÔöÇ](fg:#ffffff) $directory\
${custom.pkg_npm}${custom.pkg_yarn}${custom.pkg_pnpm}${custom.pkg_bun}${custom.pkg_composer}\
${custom.lang_c}$cmake${custom.lang_cpp}${custom.runtime_node}${custom.runtime_bun}${custom.fw_react}${custom.fw_vue}${custom.test_vitest}${custom.test_jest}${custom.lang_python}${custom.lang_rust}${custom.lang_go}${custom.lang_java}${custom.lang_lua}${custom.lang_ruby}${custom.lang_php}\
$fill$docker_context$terraform$helm$kubernetes$container$cmd_duration$status\n\
([Ôöé](fg:#ffffff) $git_branch$git_status$git_commit$git_state$git_metrics\n)\
[ÔĽ░](fg:#ffffff)$character"""

right_format = "$env_var$username$sudo"
palette      = 'cyberdream'

[palettes.cyberdream]
color_overlay = '#2a3555'
color_blue   = '#4d9fff'
color_aqua   = '#00eaff'
color_green  = '#00ff15'
color_orange = '#ff8c00'
color_red    = '#ff3b25'
color_yellow = '#eaff00'
color_pink   = '#ff2c84'
color_mauve  = '#c084fc'
color_git    = '#c74229'
color_white   = '#ffffff'
color_black   = '#000000'

# Toolchain official brand colors
color_node      = '#67ac52'
color_python    = '#cca835'
color_rust = '#a43422'
color_go        = '#008aac'
color_java      = '#bd6f00'
color_lua  = '#000066'
color_ruby = '#a32924'
color_php  = '#3f4875'
color_docker    = '#1c78bd'
color_terraform = '#623496'
color_helm      = '#1f617f'
color_k8s       = '#2856b7'
color_c    = '#8694a3'
color_cmake     = '#306599'
color_npm       = '#a22c2c'
color_bun       = '#c4841c'
color_cpp       = '#507ba8'
color_container = '#1e847b'
color_yarn      = '#237195'
color_pnpm      = '#c47419'
# FE frameworks + test runners
color_react     = '#52b9d5'
color_vue       = '#42b883'
color_vitest    = '#729b1b'
color_jest      = '#c21325'

# ============================================================
#  Row 1 ÔÇö Identity
# ============================================================

[sudo]
disabled = false
style    = "color_yellow"
symbol   = "´łŤ"
format   = "[ $symbol]($style) "

[username]
show_always = true
style_user  = "color_aqua"
style_root  = "color_red"
format      = "[ˇ░Őá $user]($style) "

[directory]
style             = "color_blue"
format            = """
[ţâç](fg:$style)[ţŚż](bold fg:color_white bg:$style)[ţâć](fg:$style bg:color_overlay)\
[ $path](bold fg:$style bg:color_overlay)[ţâć](fg:color_overlay) \
"""
truncation_length = 2
truncation_symbol = ""
use_os_path_sep   = false
truncate_to_repo  = false
use_logical_path  = true

[directory.substitutions]
"Documents" = "Docs"
"Downloads" = "DL"
"Desktop"   = "Desk"
"Projects"  = "Proj"

# ============================================================
#  Row 2 ÔÇö Git full details
# ============================================================

[git_branch]
symbol   = "ţťą "
style    = "fg:color_git bold"
format   = "([$symbol$branch(:$remote_branch)]($style) )"

[git_status]
style      = "fg:color_git bold"
format     = "([ˇ▒ľź $all_status$ahead_behind]($style) )"
ahead      = "^$count"
behind     = "v$count"
diverged   = "^${ahead_count}v${behind_count}"
untracked  = "?$count"
stashed    = "S$count"
modified   = "!$count"
staged     = "+$count"
deleted    = "x$count"
conflicted = "=$count"
renamed    = "r$count"

[git_commit]
only_detached      = false
format              = "([ţťę @$hash$tag ](fg:color_git))"
commit_hash_length = 6
tag_symbol         = " #"
tag_disabled       = false

[git_state]
style           = "fg:color_git bold"
format          = "[ˇ▒ç» $state]($style)( $progress_current/$progress_total) "
rebase          = "REBASE"
merge           = "MERGE"
revert          = "REVERT"
cherry_pick     = "CHERRY"
bisect          = "BISECT"
am              = "AM"
am_or_rebase    = "AM/REBASE"

[git_metrics]
disabled              = false
added_style           = "fg:color_green bold"
deleted_style         = "fg:color_red bold"
format                = "(ţşâ ([+$added ]($added_style))([-$deleted ]($deleted_style)))"
only_nonzero_diffs    = true

# ============================================================
#  Row 3 ÔÇö Shell info
# ============================================================

[cmd_duration]
min_time           = 500
show_milliseconds  = false
min_time_to_notify = 10000
format             = """
[ţâç](fg:color_mauve)[ˇ░öŤ](bold fg:color_white bg:color_mauve)[ţâć](fg:color_mauve bg:color_overlay)\
[ $duration](bold fg:color_mauve bg:color_overlay)[ţâć](fg:color_overlay)\
"""

# ============================================================
#  Row 4 ÔÇö Env vars + package + build tools
# ============================================================

[env_var.VIRTUAL_ENV]
variable = "VIRTUAL_ENV"
style    = "fg:color_pink bold"
format   = "([ţ¬ł $env_value]($style) )"
default  = ""

[container]
disabled = false
style    = "color_container"
format = """
[ţâç](fg:$style)[´ĺĚ](bold fg:color_white bg:$style)[ţâć](fg:$style bg:color_overlay)\
[ $name](bold fg:$style bg:color_overlay)[ţâć](fg:color_overlay) \
"""

[custom.pkg_npm]
when    = "test -f package.json && ! test -f yarn.lock && ! test -f pnpm-lock.yaml && ! test -f bun.lock && ! test -f bun.lockb && ! test -f bunfig.toml"
# command = "req=$(python3 -c \"import json; d=json.load(open('package.json')); pm=d.get('packageManager',''); v=(pm.split('@',1)[1].split('+')[0] if pm.startswith('npm@') else d.get('engines',{}).get('npm','')); print(v,end='')\" 2>/dev/null); inst=$(npm --version 2>/dev/null); out=${req}$([ -n \"$inst\" ] && printf '(%s)' \"$inst\"); [ -n \"$out\" ] && printf '%s' \"$out\""
style   = "color_npm"
format = "[ţâç](fg:color_npm)[ţť×](bold fg:color_white bg:color_npm)[ţâć](fg:color_npm) "
# --- verbose (version) below ÔÇö uncomment block + command, remove icon-only line, to restore ---
# format = """
# [ţâç](fg:color_npm)[ţť×](bold fg:color_white bg:color_npm)[ţâć](fg:color_npm bg:color_overlay)\
# [ $output](bold fg:color_npm bg:color_overlay)[ţâć](fg:color_overlay) \
# """

[custom.pkg_yarn]
when    = "test -f yarn.lock && test -f package.json"
# command = "req=$(python3 -c \"import json; d=json.load(open('package.json')); pm=d.get('packageManager',''); v=(pm.split('@',1)[1].split('+')[0] if pm.startswith('yarn@') else d.get('engines',{}).get('yarn','')); print(v,end='')\" 2>/dev/null); inst=$(yarn --version 2>/dev/null); out=${req}$([ -n \"$inst\" ] && printf '(%s)' \"$inst\"); [ -n \"$out\" ] && printf '%s' \"$out\""
style   = "color_yarn"
format = "[ţâç](fg:color_yarn)[ţÜž](bold fg:color_white bg:color_yarn)[ţâć](fg:color_yarn) "
# --- verbose (version) below ÔÇö uncomment block + command, remove icon-only line, to restore ---
# format = """
# [ţâç](fg:color_yarn)[ţÜž](bold fg:color_white bg:color_yarn)[ţâć](fg:color_yarn bg:color_overlay)\
# [ $output](bold fg:color_yarn bg:color_overlay)[ţâć](fg:color_overlay) \
# """

[custom.pkg_pnpm]
when    = "test -f pnpm-lock.yaml && test -f package.json"
# command = "req=$(python3 -c \"import json; d=json.load(open('package.json')); pm=d.get('packageManager',''); v=(pm.split('@',1)[1].split('+')[0] if pm.startswith('pnpm@') else d.get('engines',{}).get('pnpm','')); print(v,end='')\" 2>/dev/null); inst=$(pnpm --version 2>/dev/null); out=${req}$([ -n \"$inst\" ] && printf '(%s)' \"$inst\"); [ -n \"$out\" ] && printf '%s' \"$out\""
style   = "color_pnpm"
format = "[ţâç](fg:color_pnpm)[ţíą](bold fg:color_white bg:color_pnpm)[ţâć](fg:color_pnpm) "
# --- verbose (version) below ÔÇö uncomment block + command, remove icon-only line, to restore ---
# format = """
# [ţâç](fg:color_pnpm)[ţíą](bold fg:color_white bg:color_pnpm)[ţâć](fg:color_pnpm bg:color_overlay)\
# [ $output](bold fg:color_pnpm bg:color_overlay)[ţâć](fg:color_overlay) \
# """

[custom.pkg_bun]
# Bun as package manager only (node is the runtime); collapses into lang_bun when bun is also the runtime
when    = "( test -f bun.lock || test -f bun.lockb ) && ( test -f .nvmrc || test -f .node-version || ( test -f package.json && python3 -c \"import json,sys;d=json.load(open('package.json'));sys.exit(0 if d.get('engines',{}).get('node') else 1)\" 2>/dev/null ) )"
# command = "req=$([ -f package.json ] && python3 -c \"import json; d=json.load(open('package.json')); pm=d.get('packageManager',''); v=(pm.split('@',1)[1].split('+')[0] if pm.startswith('bun@') else d.get('engines',{}).get('bun','')); print(v,end='')\" 2>/dev/null); inst=$(bun --version 2>/dev/null); out=${req}$([ -n \"$inst\" ] && printf '(%s)' \"$inst\"); [ -n \"$out\" ] && printf '%s' \"$out\""
style   = "color_bun"
format = "[ţâç](fg:color_bun)[ţŁ»](bold fg:color_white bg:color_bun)[ţâć](fg:color_bun) "
# --- verbose (version) below ÔÇö uncomment block + command, remove icon-only line, to restore ---
# format = """
# [ţâç](fg:color_bun)[ţŁ»](bold fg:color_white bg:color_bun)[ţâć](fg:color_bun bg:color_overlay)\
# [ $output](bold fg:color_bun bg:color_overlay)[ţâć](fg:color_overlay) \
# """

[custom.pkg_composer]
when    = "test -f composer.json"
# command = "inst=$(composer --version 2>/dev/null | awk '{print $3}'); [ -n \"$inst\" ] && printf '(%s)' \"$inst\""
style   = "color_php"
format = "[ţâç](fg:color_php)[ţ×â](bold fg:color_white bg:color_php)[ţâć](fg:color_php) "
# --- verbose (version) below ÔÇö uncomment block + command, remove icon-only line, to restore ---
# format = """
# [ţâç](fg:color_php)[ţ×â](bold fg:color_white bg:color_php)[ţâć](fg:color_php bg:color_overlay)\
# [ $output](bold fg:color_php bg:color_overlay)[ţâć](fg:color_overlay) \
# """

[cmake]
disabled = false
style    = "color_cmake"
format = "[ţâç](fg:$style)[ţ×ö](bold fg:color_white bg:$style)[ţâć](fg:$style) "
# --- verbose (version) below ÔÇö uncomment block + command, remove icon-only line, to restore ---
# format = """
# [ţâç](fg:$style)[ţ×ö](bold fg:color_white bg:$style)[ţâć](fg:$style bg:color_overlay)\
# [ $version](bold fg:$style bg:color_overlay)[ţâć](fg:color_overlay) \
# """

# ============================================================
#  Row 5 ÔÇö Toolchain (auto-hides per directory)
# ============================================================

[docker_context]
style           = "color_docker"
only_with_files = false
format = """
[ţâç](fg:$style)[´łč](bold fg:color_white bg:$style)[ţâć](fg:$style bg:color_overlay)\
[ $context](bold fg:$style bg:color_overlay)[ţâć](fg:color_overlay) \
"""

[terraform]
disabled = false
style    = "color_terraform"
format = """
[ţâç](fg:$style)[ţóŻ](bold fg:color_white bg:$style)[ţâć](fg:$style bg:color_overlay)\
[ $workspace](bold fg:$style bg:color_overlay)[ţâć](fg:color_overlay) \
"""

[helm]
disabled = false
style    = "color_helm"
format = """
[ţâç](fg:$style)[ţč╗](bold fg:color_white bg:$style)[ţâć](fg:$style bg:color_overlay)\
[ $version](bold fg:$style bg:color_overlay)[ţâć](fg:color_overlay) \
"""

[kubernetes]
