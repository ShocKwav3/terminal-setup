[ţâç](fg:$style)[ţáŁ](bold fg:color_white bg:$style)[ţâć](fg:$style bg:color_overlay)\
[ $context](bold fg:$style bg:color_overlay)[ţâć](fg:color_overlay) \
"""

# ============================================================
#  Prompt character
# ============================================================

[character]
format         = "$symbol"
success_symbol = "[´âÜţ¬Â ](bold fg:color_aqua)"
error_symbol   = "[´âÜţ¬Â ](bold fg:color_red)"
vimcmd_symbol  = "[N ](bold fg:color_green)"

[fill]
symbol = " "

[status]
disabled = false
symbol = "´Ź×"
success_symbol = "ˇ░äş"
style = "color_red"
success_style = "color_green"
format = """
[ţâç](fg:color_black)[$symbol](bold fg:$style bg:color_black)[ţâć](fg:color_black bg:color_overlay)\
[$status](bold fg:$style bg:color_overlay)[ţâć](fg:color_overlay)\
"""

