# ============================================================
#  starship.toml έΑΦ cyberdream ┬╖ macOS / zsh ┬╖ CUSTOMIZED
#  Shell commands below assume POSIX sh (test/ls/awk/python3).
# ============================================================

# --- TOP LEVEL LAYOUT ---
# Removed the memory/battery/time row entirely.
# --- SYMBOLS (Nerd Font, cannot be stored in palette) ---
# Left cap : U+E0C7
# Right cap: U+E0C6

format = """
[έΧφέΦΑέΦΑ](fg:#ffffff) $directory\
${custom.pkg_npm}${custom.pkg_yarn}${custom.pkg_pnpm}${custom.pkg_bun}${custom.pkg_composer}\
${custom.lang_c}$cmake${custom.lang_cpp}${custom.runtime_node}${custom.runtime_bun}${custom.fw_react}${custom.fw_vue}${custom.test_vitest}${custom.test_jest}${custom.lang_python}${custom.lang_rust}${custom.lang_go}${custom.lang_java}${custom.lang_lua}${custom.lang_ruby}${custom.lang_php}\
$fill$docker_context$terraform$helm$kubernetes$container$cmd_duration$status\n\
([έΦΓ](fg:#ffffff) $git_branch$git_status$git_commit$git_state$git_metrics\n)\
[έΧ░](fg:#ffffff)$character"""

right_format = "$env_var$username$sudo"
palette      = 'cyberdream'

[palettes.cyberdream]
color_overlay = '#2a3555'
color_blue   = '#4d9fff'
color_aqua   = '#00eaff'
color_green  = '#00ff15'
color_orange = '#ff8c00'
color_red    = '#ff3b25'
color_yellow = '#eaff00'
color_pink   = '#ff2c84'
color_mauve  = '#c084fc'
color_git    = '#c74229'
color_white   = '#ffffff'
color_black   = '#000000'
# --- v2 (icon-colored) scheme knobs έΑΦ tweak these two to taste ---
color_grey      = '#3c3f44'   # machine grey έΑΦ uniform segment background (L1)
color_dim_white = '#b3b3b3'   # low-brightness white έΑΦ text (L1/L2/L3)

# Toolchain official brand colors
color_node      = '#67ac52'
color_python    = '#cca835'
color_rust = '#a43422'
color_go        = '#008aac'
color_java      = '#bd6f00'
color_lua  = '#000066'
color_ruby = '#a32924'
color_php  = '#3f4875'
color_docker    = '#1c78bd'
color_terraform = '#623496'
color_helm      = '#1f617f'
color_k8s       = '#2856b7'
color_c    = '#8694a3'
color_cmake     = '#306599'
color_npm       = '#a22c2c'
color_bun       = '#c4841c'
color_cpp       = '#507ba8'
color_container = '#1e847b'
color_yarn      = '#237195'
color_pnpm      = '#c47419'
# FE frameworks + test runners
color_react     = '#52b9d5'
color_vue       = '#42b883'
color_vitest    = '#729b1b'
color_jest      = '#c21325'

# ============================================================
#  Row 1 έΑΦ Identity
# ============================================================

[sudo]
disabled = false
style    = "color_yellow"
symbol   = "ΎΙδ"
format   = "[ $symbol]($style) "

[username]
show_always = true
style_user  = "color_aqua"
style_root  = "color_red"
# v1 (orig colorful έΑΦ ACTIVE; to switch: comment this block, uncomment v2):
format      = "[≤░Λι $user]($style) "
# v2 (less-color icon-only έΑΦ INACTIVE):
# format      = "[≤░Λι ](fg:$style)[$user](fg:color_dim_white) "

[directory]
style             = "color_blue"
# v1 (orig colorful έΑΦ ACTIVE; to switch: comment this block, uncomment v2):
format            = """
[ΌΔΘ](fg:$style)[ΌΩ╛](bold fg:color_white bg:$style)[ΌΔΗ](fg:$style bg:color_overlay)\
[ $path](bold fg:$style bg:color_overlay)[ΌΔΗ](fg:color_overlay) \
"""
# v2 (less-color icon-only έΑΦ INACTIVE):
# format            = """
# [ΌΔΘ](fg:color_grey)[ΌΩ╛](bold fg:$style bg:color_grey)[ΌΔΗ](fg:color_grey)\
# [$path](bold fg:color_dim_white) \
# """
truncation_length = 2
truncation_symbol = ""
use_os_path_sep   = false
truncate_to_repo  = false
use_logical_path  = true

[directory.substitutions]
"Documents" = "Docs"
"Downloads" = "DL"
"Desktop"   = "Desk"
"Projects"  = "Proj"

# ============================================================
#  Row 2 έΑΦ Git full details
# ============================================================

[git_branch]
symbol   = "Όεξ "
style    = "fg:color_git bold"
format   = "([$symbol](fg:color_git bold)[$branch(:$remote_branch)](fg:color_dim_white bold) )"

[git_status]
style      = "fg:color_git bold"
format     = "([≤▒Ψτ ](fg:color_git bold)[$all_status$ahead_behind](fg:color_dim_white bold) )"
ahead      = "^$count"
behind     = "v$count"
diverged   = "^${ahead_count}v${behind_count}"
untracked  = "?$count"
stashed    = "S$count"
modified   = "!$count"
staged     = "+$count"
deleted    = "x$count"
conflicted = "=$count"
renamed    = "r$count"

[git_commit]
only_detached      = false
format              = "([Όεσ ](fg:color_git)[@$hash$tag ](fg:color_dim_white))"
commit_hash_length = 6
tag_symbol         = " #"
tag_disabled       = false

[git_state]
style           = "fg:color_git bold"
format          = "[≤▒Θψ ](fg:color_git bold)[$state](fg:color_dim_white bold)( $progress_current/$progress_total) "
rebase          = "REBASE"
merge           = "MERGE"
revert          = "REVERT"
cherry_pick     = "CHERRY"
bisect          = "BISECT"
am              = "AM"
am_or_rebase    = "AM/REBASE"

[git_metrics]
disabled              = false
added_style           = "fg:color_green bold"
deleted_style         = "fg:color_red bold"
format                = "(ΌφΔ ([+]($added_style)[$added ](fg:color_dim_white bold))([-]($deleted_style)[$deleted ](fg:color_dim_white bold)))"
only_nonzero_diffs    = true

# ============================================================
#  Row 3 έΑΦ Shell info
# ============================================================

[cmd_duration]
min_time           = 500
show_milliseconds  = false
min_time_to_notify = 10000
# v1 (orig colorful έΑΦ ACTIVE; to switch: comment this block, uncomment v2):
format             = """
[ΌΔΘ](fg:color_mauve)[≤░Φδ](bold fg:color_white bg:color_mauve)[ΌΔΗ](fg:color_mauve bg:color_overlay)\
[ $duration](bold fg:color_mauve bg:color_overlay)[ΌΔΗ](fg:color_overlay)\
"""
# v2 (less-color icon-only έΑΦ INACTIVE):
# format             = """
# [ΌΔΘ](fg:color_grey)[≤░Φδ](bold fg:color_mauve bg:color_grey)[ΌΔΗ](fg:color_grey)\
# [$duration](bold fg:color_dim_white)\
# """

# ============================================================
#  Row 4 έΑΦ Env vars + package + build tools
# ============================================================

[env_var.VIRTUAL_ENV]
variable = "VIRTUAL_ENV"
style    = "fg:color_pink bold"
# v1 (orig colorful έΑΦ ACTIVE; to switch: comment this block, uncomment v2):
format   = "([ΌςΙ $env_value]($style) )"
# v2 (less-color icon-only έΑΦ INACTIVE):
# format   = "([ΌςΙ ](fg:color_pink bold)[$env_value](fg:color_dim_white bold) )"
default  = ""

[container]
disabled = false
style    = "color_container"
# v1 (orig colorful έΑΦ ACTIVE; to switch: comment this block, uncomment v2):
format = """
[ΌΔΘ](fg:$style)[ΎΤ╖](bold fg:color_white bg:$style)[ΌΔΗ](fg:$style bg:color_overlay)\
[ $name](bold fg:$style bg:color_overlay)[ΌΔΗ](fg:color_overlay) \
"""
# v2 (less-color icon-only έΑΦ INACTIVE):
# format = """
# [ΌΔΘ](fg:color_grey)[ΎΤ╖](bold fg:$style bg:color_grey)[ΌΔΗ](fg:color_grey)\
# [$name](bold fg:color_dim_white) \
# """

[custom.pkg_npm]
when    = "test -f package.json && ! test -f yarn.lock && ! test -f pnpm-lock.yaml && ! test -f bun.lock && ! test -f bun.lockb && ! test -f bunfig.toml"
# command = "req=$(python3 -c \"import json; d=json.load(open('package.json')); pm=d.get('packageManager',''); v=(pm.split('@',1)[1].split('+')[0] if pm.startswith('npm@') else d.get('engines',{}).get('npm','')); print(v,end='')\" 2>/dev/null); inst=$(npm --version 2>/dev/null); out=${req}$([ -n \"$inst\" ] && printf '(%s)' \"$inst\"); [ -n \"$out\" ] && printf '%s' \"$out\""
style   = "color_npm"
# v1 (orig colorful έΑΦ ACTIVE; to switch: comment this block, uncomment v2):
format = "[ΌΔΘ](fg:color_npm)[Όεη](bold fg:color_white bg:color_npm)[ΌΔΗ](fg:color_npm) "
# v2 (less-color icon-only έΑΦ INACTIVE):
# format = "[ΌΔΘ](fg:color_grey)[Όεη](bold fg:color_npm bg:color_grey)[ΌΔΗ](fg:color_grey) "
# --- verbose (version) below έΑΦ uncomment block + command, remove icon-only line, to restore ---
# format = """
# [ΌΔΘ](fg:color_npm)[Όεη](bold fg:color_white bg:color_npm)[ΌΔΗ](fg:color_npm bg:color_overlay)\
# [ $output](bold fg:color_npm bg:color_overlay)[ΌΔΗ](fg:color_overlay) \
# """
# v4 (less-color verbose έΑΦ INACTIVE):
# format = """
# [ΌΔΘ](fg:color_grey)[Όεη](bold fg:color_npm bg:color_grey)[ΌΔΗ](fg:color_grey)\
# [ $output](bold fg:color_dim_white) \
# """

[custom.pkg_yarn]
when    = "test -f yarn.lock && test -f package.json"
# command = "req=$(python3 -c \"import json; d=json.load(open('package.json')); pm=d.get('packageManager',''); v=(pm.split('@',1)[1].split('+')[0] if pm.startswith('yarn@') else d.get('engines',{}).get('yarn','')); print(v,end='')\" 2>/dev/null); inst=$(yarn --version 2>/dev/null); out=${req}$([ -n \"$inst\" ] && printf '(%s)' \"$inst\"); [ -n \"$out\" ] && printf '%s' \"$out\""
style   = "color_yarn"
# v1 (orig colorful έΑΦ ACTIVE; to switch: comment this block, uncomment v2):
