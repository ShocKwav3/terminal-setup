# --- Runtimes ---

[custom.runtime_node]
# Node runtime: explicit node pin (.nvmrc/.node-version/engines.node), or package.json present and not bun-centric
when    = "test -f .nvmrc || test -f .node-version || ( test -f package.json && python3 -c \"import json,sys;d=json.load(open('package.json'));sys.exit(0 if d.get('engines',{}).get('node') else 1)\" 2>/dev/null ) || ( test -f package.json && ! test -f bunfig.toml && ! test -f bun.lock && ! test -f bun.lockb )"
# command = "req=$(cat .nvmrc 2>/dev/null | awk 'NF{print; exit}' | sed 's/^v//'); [ -z \"$req\" ] && req=$(cat .node-version 2>/dev/null | awk 'NF{print; exit}' | sed 's/^v//'); [ -z \"$req\" ] && [ -f package.json ] && req=$(python3 -c \"import json; d=json.load(open('package.json')); print(d.get('engines',{}).get('node',''),end='')\" 2>/dev/null); inst=$(node --version 2>/dev/null | sed 's/^v//'); [ -n \"$inst\" ] && printf '%s(%s)' \"$req\" \"$inst\""
style   = "color_node"
format = "[ţâç](fg:color_node)[ţ┤Ź](bold fg:color_white bg:color_node)[ţâć](fg:color_node) "
# --- verbose (version) below ÔÇö uncomment block + command, remove icon-only line, to restore ---
# format = """
# [ţâç](fg:color_node)[ţ┤Ź](bold fg:color_white bg:color_node)[ţâć](fg:color_node bg:color_overlay)\
# [ $output](bold fg:color_node bg:color_overlay)[ţâć](fg:color_overlay) \
# """

[custom.runtime_bun]
# Bun runtime: bun-centric (bunfig.toml/bun.lock/bun.lockb) AND no explicit node pin
when    = "( test -f bunfig.toml || test -f bun.lock || test -f bun.lockb ) && ! test -f .nvmrc && ! test -f .node-version && ! ( test -f package.json && python3 -c \"import json,sys;d=json.load(open('package.json'));sys.exit(0 if d.get('engines',{}).get('node') else 1)\" 2>/dev/null )"
# command = "req=$([ -f package.json ] && python3 -c \"import json; d=json.load(open('package.json')); print(d.get('engines',{}).get('bun',''),end='')\" 2>/dev/null); inst=$(bun --version 2>/dev/null); [ -n \"$inst\" ] && printf '%s(%s)' \"$req\" \"$inst\""
style   = "color_bun"
format = "[ţâç](fg:color_bun)[ţŁ»](bold fg:color_white bg:color_bun)[ţâć](fg:color_bun) "
# --- verbose (version) below ÔÇö uncomment block + command, remove icon-only line, to restore ---
# format = """
# [ţâç](fg:color_bun)[ţŁ»](bold fg:color_white bg:color_bun)[ţâć](fg:color_bun bg:color_overlay)\
# [ $output](bold fg:color_bun bg:color_overlay)[ţâć](fg:color_overlay) \
# """

# --- Frameworks (FE) ---

[custom.fw_react]
# React: dep react
when    = "test -f package.json && python3 -c \"import json,sys;d=json.load(open('package.json'));dd={**d.get('dependencies',{}),**d.get('devDependencies',{})};sys.exit(0 if 'react' in dd else 1)\" 2>/dev/null"
# command = "python3 -c \"import json,os; d=json.load(open('package.json')) if os.path.exists('package.json') else {}; dd={**d.get('dependencies',{}),**d.get('devDependencies',{})}; req=dd.get('react',''); p='node_modules/react/package.json'; inst=(json.load(open(p)).get('version','') if os.path.exists(p) else ''); print((req+('('+inst+')' if inst else '')) if (req or inst) else '', end='')\" 2>/dev/null"
style   = "color_react"
