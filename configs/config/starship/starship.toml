[custom.test_jest]
# Jest: jest.config.* / "jest" key / dep jest
when    = "( test -f jest.config.js || test -f jest.config.ts || test -f jest.config.mjs || test -f jest.config.cjs || test -f jest.config.json ) || ( test -f package.json && python3 -c \"import json,sys;d=json.load(open('package.json'));dd={**d.get('dependencies',{}),**d.get('devDependencies',{})};sys.exit(0 if ('jest' in dd or 'jest' in d) else 1)\" 2>/dev/null )"
